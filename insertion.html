<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插入排序法 (Insertion Sort)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>插入排序法 (Insertion Sort)</h1>
        <a class="back-btn" href="index.html">回首頁</a>
        <div class="sort-section">
            <p>輸入一串數字（用空格分隔），點擊開始動畫來執行插入排序。</p>
            <div class="sort-input">
                <label for="insertionCount">數字個數 (1-200)：</label>
                <input type="number" id="insertionCount" min="1" max="200" value="10">
                <button onclick="generateRandomNumbers('insertion')">生成隨機數字</button>
                <button onclick="startSortAnimation('insertion')">開始動畫</button>
            </div>
            <div class="speed-control">
                <label for="insertionSpeed">動畫速度：</label>
                <select id="insertionSpeedPreset">
                    <option value="fast">快速 (100ms)</option>
                    <option value="normal" selected>正常 (700ms)</option>
                    <option value="slow">慢速 (1500ms)</option>
                </select>
                <input type="range" id="insertionSpeed" min="1" max="2000" value="700" step="1">
                <input type="number" id="insertionSpeedInput" min="1" max="2000" value="700" step="1">
                <span id="insertionSpeedValue">700ms</span>
            </div>
            <div class="animation-controls">
                <button id="pauseBtnInsertion" onclick="togglePause()" disabled>暫停</button>
                <button id="backBtnInsertion" onclick="stepBack()" disabled>上一步</button>
                <button id="forwardBtnInsertion" onclick="stepForward()" disabled>下一步</button>
            </div>
            <div class="visualization">
                <h4>排序結果</h4>
                <div id="stepInsertion" class="step-display">等待開始</div>
                <div class="bars" id="insertionSortedVis"></div>
            </div>
            <div id="insertionOutput" class="output"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        initializeSpeedControl('insertion');
    </script>
</body>
</html>
