<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插入排序法 (Insertion Sort)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>插入排序法 (Insertion Sort)</h1>
        <a class="back-btn" href="index.html">回首頁</a>
        <div class="diagram">
            <h3>圖示說明</h3>
            <div class="diagram-bars">
                <div class="diagram-bar" style="height: 50px;">5</div>
                <div class="diagram-bar" style="height: 30px;">3</div>
                <div class="diagram-bar" style="height: 80px;">8</div>
                <div class="diagram-bar" style="height: 20px;">1</div>
                <div class="diagram-bar" style="height: 90px;">9</div>
            </div>
            <div class="diagram-note">將每個元素依序插入到已排序的左側位置。</div>
        </div>
        <div class="sort-section">
            <p>輸入一串數字（用空格分隔），點擊開始動畫來執行插入排序。</p>
            <div class="sort-input">
                <input type="text" id="insertionInput" placeholder="例如: 5 3 8 1 9">
                <button onclick="startSortAnimation('insertion')">開始動畫</button>
            </div>
            <div class="animation-controls">
                <button id="pauseBtnInsertion" onclick="togglePause()" disabled>暫停</button>
                <button id="backBtnInsertion" onclick="stepBack()" disabled>上一步</button>
                <button id="forwardBtnInsertion" onclick="stepForward()" disabled>下一步</button>
            </div>
            <div id="statusInsertion" class="status">等待開始</div>
            <div class="visualization">
                <h4>初始陣列</h4>
                <div class="bars" id="insertionInitialVis"></div>
                <h4>排序後陣列</h4>
                <div class="bars" id="insertionSortedVis"></div>
            </div>
            <div id="insertionOutput" class="output"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
