<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序法 (Merge Sort)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>合併排序法 (Merge Sort)</h1>
        <a class="back-btn" href="index.html">回首頁</a>
        <div class="sort-section">
            <p>輸入一串數字（用空格分隔），點擊開始動畫來執行合併排序。</p>
            <div class="sort-input">
                <label for="mergeCount">數字個數 (1-200)：</label>
                <input type="number" id="mergeCount" min="1" max="200" value="10">
                <button onclick="generateRandomNumbers('merge')">生成隨機數字</button>
                <button onclick="startSortAnimation('merge')">開始動畫</button>
            </div>
            <div class="speed-control">
                <label for="mergeSpeed">動畫速度：</label>
                <select id="mergeSpeedPreset">
                    <option value="fast">快速 (100ms)</option>
                    <option value="normal" selected>正常 (700ms)</option>
                    <option value="slow">慢速 (1500ms)</option>
                </select>
                <input type="range" id="mergeSpeed" min="1" max="2000" value="700" step="1">
                <input type="number" id="mergeSpeedInput" min="1" max="2000" value="700" step="1">
                <span id="mergeSpeedValue">700ms</span>
            </div>
            <div class="animation-controls">
                <button id="pauseBtnMerge" onclick="togglePause()" disabled>暫停</button>
                <button id="backBtnMerge" onclick="stepBack()" disabled>上一步</button>
                <button id="forwardBtnMerge" onclick="stepForward()" disabled>下一步</button>
            </div>
            <div id="statusMerge" class="status">等待開始</div>
            <div class="visualization">
                <h4>排序結果</h4>
                <div class="bars" id="mergeSortedVis"></div>
            </div>
            <div id="mergeOutput" class="output"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        initializeSpeedControl('merge');
    </script>
</body>
</html>
