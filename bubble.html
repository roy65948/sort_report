<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法 (Bubble Sort)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>氣泡排序法 (Bubble Sort)</h1>
        <a class="back-btn" href="index.html">回首頁</a>
        <div class="sort-section">
            <p>輸入一串數字（用空格分隔），點擊開始動畫來執行氣泡排序。</p>
            <div class="sort-input">
                <label for="bubbleCount">數字個數 (1-200)：</label>
                <input type="number" id="bubbleCount" min="1" max="200" value="10">
                <button onclick="generateRandomNumbers('bubble')">生成隨機數字</button>
                <button onclick="startSortAnimation('bubble')">開始動畫</button>
            </div>
            <div class="speed-control">
                <label for="bubbleSpeed">動畫速度：</label>
                <input type="range" id="bubbleSpeed" min="1" max="2000" value="700" step="1">
                <input type="number" id="bubbleSpeedInput" min="1" max="2000" value="700" step="1">
                <span id="bubbleSpeedValue">700ms</span>
            </div>
            <div class="animation-controls">
                <button id="pauseBtnBubble" onclick="togglePause()" disabled>暫停</button>
                <button id="backBtnBubble" onclick="stepBack()" disabled>上一步</button>
                <button id="forwardBtnBubble" onclick="stepForward()" disabled>下一步</button>
            </div>
            <div id="statusBubble" class="status">等待開始</div>
            <div class="visualization">
                <h4>排序結果</h4>
                <div class="bars" id="bubbleSortedVis"></div>
            </div>
            <div id="output" class="output"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        initializeSpeedControl('bubble');
    </script>
</body>
</html>
