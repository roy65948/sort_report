<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇排序法 (Selection Sort)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>選擇排序法 (Selection Sort)</h1>
        <a class="back-btn" href="index.html">回首頁</a>
        <div class="diagram">
            <h3>圖示說明</h3>
            <div class="diagram-bars">
                <div class="diagram-bar" style="height: 70px;">7</div>
                <div class="diagram-bar" style="height: 30px;">3</div>
                <div class="diagram-bar" style="height: 90px;">9</div>
                <div class="diagram-bar" style="height: 50px;">5</div>
            </div>
            <div class="diagram-note">每輪選出最小（或最大）元素，放到已排好序的左側。</div>
        </div>
        <div class="sort-section">
            <p>輸入一串數字（用空格分隔），點擊開始動畫來執行選擇排序。</p>
            <div class="sort-input">
                <input type="text" id="selectionInput" placeholder="例如: 5 3 8 1 9">
                <button onclick="startSortAnimation('selection')">開始動畫</button>
            </div>
            <div class="animation-controls">
                <button id="pauseBtnSelection" onclick="togglePause()" disabled>暫停</button>
                <button id="backBtnSelection" onclick="stepBack()" disabled>上一步</button>
                <button id="forwardBtnSelection" onclick="stepForward()" disabled>下一步</button>
            </div>
            <div id="statusSelection" class="status">等待開始</div>
            <div class="visualization">
                <h4>初始陣列</h4>
                <div class="bars" id="selectionInitialVis"></div>
                <h4>排序後陣列</h4>
                <div class="bars" id="selectionSortedVis"></div>
            </div>
            <div id="selectionOutput" class="output"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
